<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Wi-Fi &amp; IP App</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="text"], input[type="password"] {
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 200px; /* 見た目を調整 */
        }

        #status {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f0f0f0;
        }

        #ipAddressDisplay {
            font-weight: bold;
            color: blue;
        }

        #portNumberDisplay { /* ポート番号表示用に新しく追加 */
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <h1>BLE Wi-Fi &amp; IP App</h1>
    <p>対象デバイス名: <input type="text" id="deviceNameInput"></p>
    <p>送信SSID: <input type="text" id="ssidInput"></p>
    <p>送信PASSWORD: <input type="password" id="passwordInput"></p>

    <button id="sendWifiBtn">Wi-Fi情報送信</button>
    <button id="receiveIpBtn">IPアドレス/ポート番号受信</button>

    <div id="status">
        <p>接続ステータス: <span id="connectionStatus"></span></p>
        <p>受信IPアドレス: <span id="ipAddressDisplay"></span></p>
        <p>受信ポート番号: <span id="portNumberDisplay"></span></p> <!-- ポート番号表示用の要素を追加 -->
    </div>

    <script>
        let device;
        let server;
        let service;
        let ssidChar; // Wi-Fi SSID送信用のCharacteristic
        let passChar; // Wi-Fi Password送信用のCharacteristic
        let ipChar; // IPアドレス通知用のCharacteristic (コメントアウトを解除)
        let portChar; // ポート番号通知用のCharacteristic (新しく追加)

        // IMPORTANT: These UUIDs must be replaced with the actual UUIDs of your BLE device's service and characteristics.
        const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
        const SSID_CHAR_UUID = "abcdefab-1234-5678-9abc-abcdefabcdef"; // C++コードのCHARACTERISTIC_SSIDに対応
        const PASS_CHAR_UUID = "abcdefac-1234-5678-9abc-abcdefabcdef"; // C++コードのCHARACTERISTIC_PASSに対応
        const IP_CHAR_UUID = "abcdefad-1234-5678-9abc-abcdefabcdef"; // C++コードのCHARACTERISTIC_IPに対応 (コメントアウトを解除)
        const PORT_CHAR_UUID = "abcdefae-1234-5678-9abc-abcdefabcdef"; // C++コードのCHARACTERISTIC_PORTに対応 (新しく追加)

        // デフォルトのデバイス名、SSID、PASSWORD
        const DEFAULT_DEVICE_NAME = "OMOCHIM";
        const DEFAULT_SSID = "OmochimStation";
        const DEFAULT_PASSWORD = "00000000";

        const connectionStatusSpan = document.getElementById("connectionStatus");
        const ipAddressDisplaySpan = document.getElementById("ipAddressDisplay");
        const portNumberDisplaySpan = document.getElementById("portNumberDisplay"); // ポート番号表示用の要素を取得

        // 入力フィールドの要素を取得
        const deviceNameInput = document.getElementById("deviceNameInput");
        const ssidInput = document.getElementById("ssidInput");
        const passwordInput = document.getElementById("passwordInput");

        // 入力フィールドにデフォルト値を設定
        deviceNameInput.value = DEFAULT_DEVICE_NAME;
        ssidInput.value = DEFAULT_SSID;
        passwordInput.value = DEFAULT_PASSWORD;

        function updateConnectionStatus(status) {
            connectionStatusSpan.textContent = status;
        }

        async function connect() {
            updateConnectionStatus("デバイスを検索し、接続中...");
            try {
                device = await navigator.bluetooth.requestDevice({
                    // デバイス名は入力フィールドの値を使用
                    filters: [{ namePrefix: deviceNameInput.value }],
                    optionalServices: [SERVICE_UUID]
                });
                device.addEventListener("gattserverdisconnected", () => {
                    console.log("Bluetooth disconnected by device");
                    updateConnectionStatus("デバイスとの接続が切れました");
                });
                server = await device.gatt.connect();
                service = await server.getPrimaryService(SERVICE_UUID);
                
                // SSIDとPasswordのCharacteristicを取得
                ssidChar = await service.getCharacteristic(SSID_CHAR_UUID);
                passChar = await service.getCharacteristic(PASS_CHAR_UUID);
                
                // IPアドレスとポート番号のCharacteristicを取得 (コメントアウトを解除/追加)
                ipChar = await service.getCharacteristic(IP_CHAR_UUID);
                portChar = await service.getCharacteristic(PORT_CHAR_UUID);

                console.log("Connected to " + deviceNameInput.value);
                updateConnectionStatus("接続済み");
                return true;
            } catch (error) {
                console.error("接続エラー:", error);
                updateConnectionStatus("接続失敗: " + error.message);
                return false;
            }
        }

        async function sendWifi(ssid, password) {
            // SSIDとPasswordの両方のCharacteristicが利用可能か確認
            if (!ssidChar || !passChar) {
                console.error("SSIDまたはPassword Characteristicが利用できません。まず接続してください。");
                updateConnectionStatus("SSID/Passwordキャラクタリスティックなし");
                return;
            }
            try {
                // SSIDを個別のCharacteristicに送信
                const ssidData = new TextEncoder().encode(ssid);
                await ssidChar.writeValue(ssidData);
                console.log("SSID送信済み:", ssid);

                // Passwordを個別のCharacteristicに送信
                const passData = new TextEncoder().encode(password);
                await passChar.writeValue(passData);
                console.log("Password送信済み:", password);

                console.log("Wi-Fi情報送信完了:", { ssid, password });
                updateConnectionStatus("Wi-Fi情報送信完了");
            } catch (error) {
                console.error("Wi-Fi情報送信エラー:", error);
                updateConnectionStatus("Wi-Fi情報送信失敗: " + error.message);
            }コツ
        }

        // IPアドレスとポート番号受信機能 (コメントアウトを解除し、ポート番号の処理を追加)
        async function reconnectAndReadIp() {
            ipAddressDisplaySpan.textContent = "受信中...";
            portNumberDisplaySpan.textContent = "受信中..."; // ポート番号も受信中に設定
            updateConnectionStatus("IPアドレスとポート番号受信準備中...");
            try {
                if (!device || !device.gatt.connected) {
                    const connected = await connect();
                    if (!connected) {
                        return;
                    }
                }
                // IPとPortのCharacteristicが利用可能か確認
                if (!ipChar || !portChar) {
                    console.error("IPまたはPort Characteristicが利用できません。");
                    updateConnectionStatus("IP/Portキャラクタリスティックなし");
                    return;
                }
                
                // IPアドレスの読み取り
                const ipValue = await ipChar.readValue();
                const ip = new TextDecoder().decode(ipValue);

                // ポート番号の読み取り
                const portValue = await portChar.readValue();
                const port = new TextDecoder().decode(portValue);

                console.log("受信したIPアドレス:", ip);
                console.log("受信したポート番号:", port); // ポート番号をログに出力
                ipAddressDisplaySpan.textContent = ip;
                portNumberDisplaySpan.textContent = port; // ポート番号を画面に表示
                updateConnectionStatus("IPアドレスとポート番号受信完了");
            } catch (error) {
                console.error("IPアドレスまたはポート番号受信エラー:", error);
                ipAddressDisplaySpan.textContent = "受信失敗";
                portNumberDisplaySpan.textContent = "受信失敗"; // ポート番号も受信失敗に設定
                
                let errorMessage = "IPアドレスとポート番号受信失敗: " + error.message;
                if (error.message === "GATT operation not permitted.") {
                    errorMessage += "。デバイス側のIPアドレスとポート番号のCharacteristicに'読み取り (read)'プロパティが設定されているか確認してください。";
                }
                updateConnectionStatus(errorMessage);
            }
        }

        document.getElementById("sendWifiBtn").addEventListener("click", async () => {
            if (!device || !device.gatt.connected) {
                const connected = await connect();
                if (!connected) return;
            }
            // Wi-Fi情報送信時に入力フィールドの値を使用
            await sendWifi(ssidInput.value, passwordInput.value);
        });

        // IPアドレス/ポート番号受信ボタンのイベントリスナー (コメントアウトを解除)
        document.getElementById("receiveIpBtn").addEventListener("click", async () => {
            await reconnectAndReadIp();
        });

        // 初期表示設定（入力フィールドのデフォルト値はスクリプトの冒頭で設定済み）
        updateConnectionStatus("未接続");
        ipAddressDisplaySpan.textContent = "N/A";
        portNumberDisplaySpan.textContent = "N/A"; // ポート番号の初期表示を設定
    </script>
</body>
</html>
